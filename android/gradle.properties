# Delete the problematic init script at:
# C:\Users\<username>\AppData\Roaming\Cursor\User\workspaceStorage\<workspace-id>\Oracle.oracle-java\userdir\var\cache\gradle\nb-tooling.gradle
# Or set JAVA_HOME environment variable to point to Java 17 JDK

