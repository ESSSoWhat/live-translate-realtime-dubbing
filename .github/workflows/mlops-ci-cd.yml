# MLOps CI/CD — extend jobs below with your install/test/deploy steps.
# Cleanup runs first so large pip installs (torch, ML libs) fit on ubuntu-latest.

name: MLOps CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mlops:
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: "1"
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker system prune -af || true
          sudo apt-get clean

      - uses: actions/checkout@v6

      # TODO: add Python/setup and pip install --no-cache-dir -r requirements.txt (or split jobs).
