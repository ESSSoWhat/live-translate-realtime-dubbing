# Invoked from ci.yml on version tags. Declaring secrets here satisfies the Actions
# language server (workflow_call secret schema); use secrets: inherit from the caller.

name: Android release (reusable)

on:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  android:
    name: Android release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: "stable"

      - name: Clean and install dependencies
        run: |
          cd mobile
          flutter clean
          flutter pub get

      - name: Test
        run: |
          cd mobile
          flutter test

      - name: Decode keystore and create key.properties
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || '' }}
        run: |
          cd mobile/android
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set; release builds will use debug signing."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" "upload-keystore.jks" > key.properties

      - name: Build release APK
        run: |
          cd mobile
          flutter build apk --release

      - name: Build App Bundle
        run: |
          cd mobile
          flutter build appbundle --release

      - name: Upload APK and AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
