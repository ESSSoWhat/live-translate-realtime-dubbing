name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 for JS-based actions (Node 20 deprecated on runners). See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for release uploads
permissions:
  contents: write

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          SUPABASE_JWT_SECRET: test-jwt-secret
          ELEVENLABS_API_KEY: test-key

  # Website is deployed via Vercel GitHub integration, skip CI check here
  # since it's a separate repository

  flutter:
    name: Flutter Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: "stable"

      - name: Clean and install dependencies
        run: |
          cd mobile
          flutter clean
          flutter pub get

      - name: Analyze
        run: |
          cd mobile
          flutter analyze --no-fatal-infos

      - name: Test
        run: |
          cd mobile
          flutter test

      # Flutter expects mobile/build/app/outputs/flutter-apk/app-debug.apk. AGP may only emit
      # build/app/outputs/apk/debug/*.apk or android/app/build/... — recover if the CLI exits 1.
      - name: Build APK
        run: |
          cd mobile
          set +e
          flutter build apk --debug
          FL=$?
          DST="build/app/outputs/flutter-apk"
          mkdir -p "$DST"
          if [ ! -f "$DST/app-debug.apk" ]; then
            for cand in \
              "build/app/outputs/flutter-apk/app-debug.apk" \
              "build/app/outputs/apk/debug/app-debug.apk" \
              "build/app/outputs/apk/debug/app-arm64-v8a-debug.apk" \
              "android/app/build/outputs/flutter-apk/app-debug.apk" \
              "android/app/build/outputs/apk/debug/app-debug.apk" \
              "android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk"
            do
              if [ -f "$cand" ]; then
                cp "$cand" "$DST/app-debug.apk"
                break
              fi
            done
          fi
          if [ ! -f "$DST/app-debug.apk" ]; then
            FOUND=""
            FOUND=$(find . -type f \( -name "app-debug.apk" -o -name "app-arm64-v8a-debug.apk" \) 2>/dev/null | head -1) || true
            if [ -n "$FOUND" ]; then
              cp "$FOUND" "$DST/app-debug.apk"
            fi
          fi
          if [ ! -f "$DST/app-debug.apk" ]; then
            echo "::error::No debug APK in $DST after recovery (flutter exit $FL)"
            find . -type f -name "*.apk" 2>/dev/null | head -30 || true
            exit 1
          fi
          exit 0

  # ── Release jobs (on tag v*) ─────────────────────────────────────────────
  release-android:
    name: Android release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/release-android-reusable.yml
    secrets: inherit

  release-ios:
    name: iOS release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: "stable"

      - name: Clean and install dependencies
        run: |
          cd mobile
          flutter clean
          flutter pub get

      - name: Test
        run: |
          cd mobile
          flutter test

      - name: Build iOS release
        run: |
          cd mobile
          flutter build ios --release --no-codesign
        # IPA upload: configure code signing (cert + provisioning profile) and use
        # flutter build ipa to produce an IPA, then add an upload step. See DEPLOY.md.

  release-desktop:
    name: Windows desktop release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    env:
      PIP_NO_CACHE_DIR: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Set FFMPEG_DIR
        run: |
          $exe = (Get-Command ffmpeg).Source
          $dir = (Get-Item $exe).DirectoryName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build with PyInstaller
        run: |
          cd live-dubbing
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install --no-cache-dir torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          .\venv\Scripts\python.exe -m pip install --no-cache-dir -e ".[dev]"
          .\venv\Scripts\python.exe -m pip install --no-cache-dir pyinstaller
          .\venv\Scripts\python.exe -m PyInstaller live_translate.spec --noconfirm

      - name: Zip artifact
        run: |
          Compress-Archive -Path "live-dubbing\dist\LiveTranslate\*" -DestinationPath "LiveTranslate-${{ github.ref_name }}.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: LiveTranslate-${{ github.ref_name }}.zip

  desktop-tests:
    name: Desktop tests (Windows)
    runs-on: windows-latest
    env:
      PIP_NO_CACHE_DIR: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd live-dubbing
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install --no-cache-dir torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          .\venv\Scripts\python.exe -m pip install --no-cache-dir -e ".[dev]"

      - name: Run pytest
        run: |
          cd live-dubbing
          .\venv\Scripts\python.exe -m pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          SUPABASE_JWT_SECRET: test-jwt-secret
          ELEVENLABS_API_KEY: test-key
