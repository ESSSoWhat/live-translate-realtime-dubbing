<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Live Translate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 450px; padding: 20px; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .logo span { color: #4f46e5; }
        h1 { font-size: 2rem; margin-bottom: 16px; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .login-box { background: #1a1a1a; border-radius: 16px; padding: 40px; }
        .icon { font-size: 4rem; margin-bottom: 24px; }
        .login-box p { color: #888; margin-bottom: 24px; }
        .btn { display: inline-block; background: #4f46e5; color: #fff; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .btn:hover { background: #4338ca; }
        .divider { margin: 30px 0; color: #555; font-size: 0.9rem; }
        .help { margin-top: 30px; padding-top: 30px; border-top: 1px solid #333; }
        .help p { color: #888; font-size: 0.95rem; margin-bottom: 8px; }
        .help a { color: #4f46e5; text-decoration: none; }
        .help a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <p class="logo">Live<span>Translate</span></p>

        <div class="login-box">
            <div class="icon">🖥️</div>
            <h1>Sign In to Live Translate</h1>
            <p>To access your account, open the Live Translate desktop app and sign in with Google.</p>

            <a href="/download" class="btn">Download the App</a>

            <div class="help">
                <p>Already have the app?</p>
                <p>Open Live Translate → Click "Sign in with Google"</p>
            </div>
        </div>

        <div class="divider">Need help?</div>
        <a href="mailto:support@livetranslate.net" style="color: #4f46e5;">support@livetranslate.net</a>
    </div>
</body>
</html>
