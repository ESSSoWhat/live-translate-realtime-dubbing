plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "app.livetranslate.live_translate_mobile"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "app.livetranslate.live_translate_mobile"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

// Flutter CLI expects APK under build/app/outputs/flutter-apk/ (project root = mobile/).
def projectRoot = rootProject.projectDir.parentFile
def dstApkDir = new File(projectRoot, "build/app/outputs/flutter-apk")
tasks.register("syncFlutterApkToRoot") {
    doLast {
        def srcApkDir = project.file("${project.projectDir}/build/outputs/flutter-apk")
        if (!srcApkDir.exists()) return
        dstApkDir.mkdirs()
        srcApkDir.eachFile { f ->
            if (f.name.endsWith(".apk")) {
                java.nio.file.Files.copy(f.toPath(), new File(dstApkDir, f.name).toPath(),
                    java.nio.file.StandardCopyOption.REPLACE_EXISTING)
            }
        }
    }
}
afterEvaluate {
    tasks.named("assembleDebug").configure { it.finalizedBy("syncFlutterApkToRoot") }
    tasks.named("assembleRelease").configure { it.finalizedBy("syncFlutterApkToRoot") }
}

