plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "app.livetranslate.live_translate_mobile"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "app.livetranslate.live_translate_mobile"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

// Flutter CLI expects APK under build/app/outputs/flutter-apk/ (project root = mobile/).
// AGP + Flutter may write under layout.buildDirectory (not always projectDir/build).
// flutter/flutter#174620 — sync after package* so APK files exist.
def projectRoot = rootProject.projectDir.parentFile
def dstApkDir = new File(projectRoot, "build/app/outputs/flutter-apk")
tasks.register("syncFlutterApkToRoot") {
    doLast {
        dstApkDir.mkdirs()
        def appBuildDir = layout.buildDirectory.get().asFile
        def copyFile = { java.io.File src, String destName ->
            java.nio.file.Files.copy(
                src.toPath(),
                new File(dstApkDir, destName).toPath(),
                java.nio.file.StandardCopyOption.REPLACE_EXISTING
            )
        }
        def copyIfExists = { java.io.File src, String destName ->
            if (src.exists()) {
                copyFile(src, destName)
            }
        }
        def outputsRoot = new File(appBuildDir, "outputs")
        if (outputsRoot.exists()) {
            outputsRoot.eachFileRecurse { f ->
                if (f.isFile() && f.name.endsWith(".apk")) {
                    copyIfExists(f, f.name)
                }
            }
        }
        def apkDebugDir = new File(appBuildDir, "outputs/apk/debug")
        def apkReleaseDir = new File(appBuildDir, "outputs/apk/release")
        // flutter build apk --target-platform android-arm64 still expects app-debug.apk
        def dstDebug = new File(dstApkDir, "app-debug.apk")
        if (!dstDebug.exists() && apkDebugDir.exists()) {
            def candidates = apkDebugDir.listFiles()?.findAll { it.name.endsWith(".apk") && it.name.contains("debug") }
            def preferred = candidates?.find { it.name.startsWith("app-arm64-v8a-") }
                    ?: candidates?.find { it.name.startsWith("app-") }
            if (preferred != null) {
                copyFile(preferred, "app-debug.apk")
            }
        }
        def dstRelease = new File(dstApkDir, "app-release.apk")
        if (!dstRelease.exists() && apkReleaseDir.exists()) {
            def candidates = apkReleaseDir.listFiles()?.findAll { it.name.endsWith(".apk") && it.name.contains("release") }
            def preferred = candidates?.find { it.name.startsWith("app-arm64-v8a-") }
                    ?: candidates?.find { it.name.startsWith("app-") }
            if (preferred != null) {
                copyFile(preferred, "app-release.apk")
            }
        }
    }
}
afterEvaluate {
    def hook = { String name ->
        def t = tasks.findByName(name)
        if (t != null) {
            t.finalizedBy(syncFlutterApkToRoot)
        }
    }
    hook("packageDebug")
    hook("packageRelease")
    hook("assembleDebug")
    hook("assembleRelease")
}

