name: live_translate_mobile
description: Live Translate mobile app — real-time mic translation via backend API.
publishTo: none
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  qonversion_flutter: ^11.3.0
  record: ^6.0.0
  just_audio: ^0.9.40
  path_provider: ^2.1.5
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
